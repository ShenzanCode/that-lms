<!DOCTYPE html>
<html>
<head>
    <title>Notification Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .notification { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Notification API Debug Test</h1>
    
    <div class="section">
        <h2>Admin Notifications (from /api/admin/notifications)</h2>
        <button onclick="fetchAdminNotifications()">Fetch Admin Notifications</button>
        <div id="adminResult"></div>
    </div>
    
    <div class="section">
        <h2>Member Notifications (from /api/notifications)</h2>
        <button onclick="fetchMemberNotifications()">Fetch Member Notifications</button>
        <div id="memberResult"></div>
    </div>

    <script>
        async function fetchAdminNotifications() {
            const resultDiv = document.getElementById('adminResult');
            try {
                const response = await fetch('/api/admin/notifications');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">✅ Success: ${response.status}</div>
                    <h3>Raw Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <h3>Notifications:</h3>
                `;
                
                if (data.success && data.data) {
                    data.data.forEach((notif, i) => {
                        resultDiv.innerHTML += `
                            <div class="notification">
                                <strong>${i + 1}. ${notif.title}</strong><br>
                                Message: ${notif.message}<br>
                                Type: ${notif.type}<br>
                                Created: ${new Date(notif.createdAt).toLocaleString()}
                            </div>
                        `;
                    });
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function fetchMemberNotifications() {
            const resultDiv = document.getElementById('memberResult');
            try {
                const response = await fetch('/api/notifications');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">✅ Success: ${response.status}</div>
                    <h3>Raw Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <h3>Notifications:</h3>
                `;
                
                if (data.success && data.data) {
                    data.data.forEach((notif, i) => {
                        resultDiv.innerHTML += `
                            <div class="notification">
                                <strong>${i + 1}. ${notif.title}</strong><br>
                                Message: ${notif.message}<br>
                                Type: ${notif.type}<br>
                                Created: ${new Date(notif.createdAt).toLocaleString()}
                            </div>
                        `;
                    });
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Auto-fetch on page load
        window.onload = function() {
            fetchAdminNotifications();
            fetchMemberNotifications();
        };
    </script>
</body>
</html>
